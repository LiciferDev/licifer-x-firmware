<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LICIFER X 3.0 (N16R8)</title>
    <style>
        :root {
            --bg: #0b0f1a; --card: #131824; --border: #1f2937;
            --accent: #00ffff; --danger: #ff3366; --text: #f3f4f6;
            --dim: #9ca3af; --success: #10b981;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { background: var(--card); padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 900; letter-spacing: 1px; color: var(--accent); text-shadow: 0 0 10px rgba(0,255,255,0.3); }
        .sys-info { text-align: right; font-size: 0.7rem; font-family: monospace; color: var(--dim); }

        main { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 80px; }
        .tab { display: none; animation: fadeIn 0.3s ease; }
        .tab.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .card-h { font-size: 0.7rem; color: var(--dim); text-transform: uppercase; margin-bottom: 12px; display: flex; justify-content: space-between; }

        .btn { border: none; border-radius: 8px; padding: 14px; font-weight: 700; width: 100%; cursor: pointer; transition: 0.2s; font-size: 0.85rem; margin-bottom: 8px; color: #000; }
        .btn-p { background: var(--accent); }
        .btn-d { background: var(--danger); color: #fff; }
        .btn-s { background: #1f2937; color: #fff; border: 1px solid var(--border); }
        .btn:active { transform: scale(0.96); opacity: 0.8; }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-box { background: var(--card); border: 1px solid var(--border); padding: 12px; border-radius: 12px; text-align: center; }
        .stat-val { font-size: 1.4rem; font-weight: 800; color: var(--accent); display: block; }
        .stat-lbl { font-size: 0.6rem; color: var(--dim); }

        .badge { font-size: 0.6rem; padding: 3px 8px; border-radius: 4px; font-weight: 900; background: #1f2937; color: var(--dim); }
        .badge.active { background: var(--accent); color: #000; box-shadow: 0 0 10px rgba(0,255,255,0.3); }

        .net-list { margin-top: 10px; }
        .net-item { padding: 12px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .net-item:active { border-color: var(--accent); }
        .net-name { font-weight: bold; font-size: 0.9rem; }
        .net-meta { font-size: 0.65rem; color: var(--dim); font-family: monospace; }

        nav { position: fixed; bottom: 0; width: 100%; background: var(--card); border-top: 1px solid var(--border); display: flex; padding: 10px 5px; z-index: 100; }
        nav button { flex: 1; background: none; border: none; color: var(--dim); font-size: 0.6rem; font-weight: 600; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        nav button.active { color: var(--accent); }
        nav svg { width: 22px; height: 22px; fill: currentColor; }

        pre { background: #000; color: #00ff41; padding: 10px; border-radius: 8px; font-size: 0.7rem; overflow-x: auto; font-family: 'Courier New', monospace; max-height: 250px; border: 1px solid #111; }
        select { width: 100%; padding: 12px; background: var(--bg); border: 1px solid var(--border); color: #fff; border-radius: 8px; margin-bottom: 10px; }
    </style>
</head>
<body>

<header>
    <div class="logo">LICIFER X 3.0</div>
    <div class="sys-info" id="sys-meta">
        CPU: --°C<br>RAM: --MB
    </div>
</header>

<main>
    <!-- DASHBOARD -->
    <div id="dash" class="tab active">
        <div class="stat-grid">
            <div class="stat-box"><span class="stat-val" id="cnt_pmkid">0</span><span class="stat-lbl">HASHES</span></div>
            <div class="stat-box"><span class="stat-val" id="cnt_nets">0</span><span class="stat-lbl">NETWORKS</span></div>
        </div>

        <div class="card">
            <div class="card-h">ATTACK MONITOR</div>
            <div style="display:flex; gap:6px; flex-wrap:wrap;">
                <span id="st_deauth" class="badge">DEAUTH</span>
                <span id="st_ble" class="badge">BLE SPAM</span>
                <span id="st_pwn" class="badge">AUTO-PWN</span>
                <span id="st_portal" class="badge">EVIL PORTAL</span>
                <span id="st_sniff" class="badge">SNIFFER</span>
            </div>
        </div>

        <button class="btn btn-p" onclick="sendCmd('start_autopwn')">INITIATE AUTO-PWN</button>
        <button class="btn btn-d" onclick="sendCmd('stop_autopwn')">HALT ALL PROCESSES</button>
    </div>

    <!-- RADAR -->
    <div id="scan" class="tab">
        <div class="card">
            <div class="card-h">
                WIFI NETWORKS
                <span onclick="sendCmd('scan')" style="color:var(--accent)">REFRESH</span>
            </div>
            <div id="netList" class="net-list"></div>
        </div>
    </div>

    <!-- STRIKE -->
    <div id="attack" class="tab">
        <div class="card">
            <div class="card-h">TARGET LOCK</div>
            <div id="targetInfo" style="padding:12px; border:1px dashed var(--accent); color:var(--accent); border-radius:8px; font-family:monospace; font-size:0.8rem; margin-bottom:15px; min-height:60px;">
                SELECT TARGET FROM RADAR
            </div>
            <button class="btn btn-p" onclick="strike('start_deauth')">DEAUTH STRIKE</button>
            <button class="btn btn-p" onclick="strike('start_sae')">WPA3 SAE FLOOD</button>
            <button class="btn btn-p" onclick="strike('grab_pmkid')">PMKID CAPTURE</button>
        </div>
        
        <div class="card">
            <div class="card-h">BEACON FLOOD</div>
            <button class="btn btn-s" onclick="sendCmd('start_beacon', {count: 60})">START BEACON FLOOD</button>
            <button class="btn btn-d" onclick="sendCmd('stop_beacon')">STOP BEACON</button>
        </div>
    </div>

    <!-- BLE -->
    <div id="ble" class="tab">
        <div class="card">
            <div class="card-h">BLUETOOTH ATTACK VECTORS</div>
            <select id="bleType">
                <option value="ble_applejuice">Apple Juice (Standard)</option>
                <option value="ble_sourapple">Sour Apple (Aggressive)</option>
                <option value="ble_fastpair">Google Fast Pair</option>
                <option value="ble_swiftpair">Microsoft Swift Pair</option>
                <option value="ble_samsung">Samsung Buds</option>
                <option value="start_ble">Random Spam Loop</option>
            </select>
            <button class="btn btn-p" onclick="sendCmd(document.getElementById('bleType').value)">EXECUTE BLE SPAM</button>
            <button class="btn btn-d" onclick="sendCmd('stop_ble')">TERMINATE BLE</button>
        </div>
    </div>

    <!-- SYSTEM -->
    <div id="sys" class="tab">
        <div class="card">
            <div class="card-h">EVIL PORTAL DATA</div>
            <button class="btn btn-s" onclick="fetchData('/api/portal')">VIEW CAPTURED CREDS</button>
            <button class="btn btn-s" onclick="fetchData('/api/pmkid')">VIEW PMKID LOGS</button>
            <pre id="logTerminal">System Ready...</pre>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px;">
                <button class="btn btn-d" style="font-size:0.6rem;" onclick="sendCmd('clear_portal_log')">CLEAR PORTAL</button>
                <button class="btn btn-d" style="font-size:0.6rem;" onclick="sendCmd('clear_pmkid')">CLEAR PMKID</button>
            </div>
        </div>
        <div class="card">
            <div class="card-h">MANAGEMENT</div>
            <button class="btn btn-s" onclick="let p=prompt('New Pass:'); if(p) sendCmd('set_password',{password:p})">CHANGE AP PASSWORD</button>
            <button class="btn btn-d" onclick="if(confirm('Reboot?')) sendCmd('reboot')">REBOOT DEVICE</button>
        </div>
    </div>
</main>

<nav>
    <button onclick="tab('dash')" id="n-dash" class="active"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Home</button>
    <button onclick="tab('scan')" id="n-scan"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8z"/><circle cx="12" cy="12" r="3"/></svg>Radar</button>
    <button onclick="tab('attack')" id="n-attack"><svg viewBox="0 0 24 24"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg>Strike</button>
    <button onclick="tab('ble')" id="n-ble"><svg viewBox="0 0 24 24"><path d="M17.71 7.71L12 2h-1v7.59L6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 11 14.41V22h1l5.71-5.71-4.3-4.29 4.3-4.29z"/></svg>BLE</button>
    <button onclick="tab('sys')" id="n-sys"><svg viewBox="0 0 24 24"><path d="M12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5zM19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.5.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.22-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.04.24.25.42.5.42h4c.25 0 .46-.18.5-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.22.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65z"/></svg>Admin</button>
</nav>

<script>
    let ws, lock = null;

    function connect() {
        ws = new WebSocket(`ws://${location.hostname}/ws`);
        ws.onmessage = (e) => {
            const data = JSON.parse(e.data);
            
            if (data.networks) {
                const list = document.getElementById('netList');
                list.innerHTML = data.networks.map(n => `
                    <div class="net-item" onclick="pick('${n.ssid}','${n.bssid}',${n.ch})">
                        <div>
                            <div class="net-name">${n.ssid}</div>
                            <div class="net-meta">${n.bssid} | CH:${n.ch} | ${n.enc}</div>
                        </div>
                        <div style="color:var(--accent); font-weight:bold;">${n.rssi}</div>
                    </div>
                `).join('');
                document.getElementById('cnt_nets').innerText = data.networks.length;
            }

            if (data.deauth !== undefined) toggle('st_deauth', data.deauth);
            if (data.ble !== undefined) toggle('st_ble', data.ble);
            if (data.autopwn !== undefined) toggle('st_pwn', data.autopwn);
            if (data.portal !== undefined) toggle('st_portal', data.portal);
            if (data.sniffer !== undefined) toggle('st_sniff', data.sniffer);
            if (data.pmkidCnt !== undefined) document.getElementById('cnt_pmkid').innerText = data.pmkidCnt;
        };
        ws.onclose = () => setTimeout(connect, 2000);
    }

    function toggle(id, active) {
        document.getElementById(id).className = 'badge' + (active ? ' active' : '');
    }

    function pick(ssid, bssid, ch) {
        lock = { ssid, bssid, ch };
        document.getElementById('targetInfo').innerHTML = `<b>SSID:</b> ${ssid}<br><b>BSSID:</b> ${bssid}<br><b>CHANNEL:</b> ${ch}`;
        tab('attack');
    }

    function strike(cmdType) {
        if (!lock) return alert("Select a target first!");
        sendCmd(cmdType, { bssid: lock.bssid, channel: lock.ch });
    }

    function sendCmd(cmd, params = {}) {
        ws.send(JSON.stringify({ cmd, ...params }));
    }

    function tab(id) {
        document.querySelectorAll('.tab, nav button').forEach(el => el.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('n-' + id).classList.add('active');
    }

    function fetchData(url) {
        const term = document.getElementById('logTerminal');
        term.innerText = "Loading data...";
        fetch(url).then(r => r.text()).then(t => {
            term.innerText = t || "File is empty or not found.";
        });
    }

    setInterval(() => {
        fetch('/api/sys').then(r => r.json()).then(d => {
            const temp = d.temp ? d.temp.toFixed(1) + '°C' : 'N/A';
            const ram = (d.psram_free / 1024 / 1024).toFixed(1) + 'MB';
            document.getElementById('sys-meta').innerHTML = `TEMP: ${temp}<br>PSRAM FREE: ${ram}`;
        }).catch(()=>{});
    }, 4000);

    connect();
</script>
</body>
</html>
