<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Licifer X — S3 Control</title>
    <style>
        :root {
            --bg: #05080a; --surface: #0f1720; --border: #1a2633;
            --text: #e2e8f0; --dim: #8b9bb4; --accent: #00ffcc;
            --danger: #ff3366; --success: #00e676; --radius: 16px;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Хедер для мобилки */
        header { background: var(--surface); padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        header .logo { font-size: 1.2rem; font-weight: 900; color: var(--accent); text-shadow: 0 0 10px rgba(0,255,204,0.3); }
        header .sys-status { font-size: 0.7rem; color: var(--dim); text-align: right; line-height: 1.2; }

        /* Нижняя навигация (таб-бар) для удобства большого пальца */
        nav { background: var(--surface); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 10px 5px; flex-shrink: 0; }
        nav a { color: var(--dim); text-decoration: none; font-size: 0.65rem; display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; transition: 0.2s; }
        nav a svg { width: 20px; height: 20px; fill: currentColor; }
        nav a.active { color: var(--accent); }

        /* Основной контент */
        main { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 40px; }
        .tab { display: none; animation: slideUp 0.3s ease-out; }
        .tab.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 20px; }
        .card h2 { font-size: 1rem; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; }

        /* Сетка статы */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .stat { background: var(--surface); border: 1px solid var(--border); padding: 15px; border-radius: var(--radius); text-align: center; }
        .stat .val { font-size: 1.8rem; font-weight: 900; color: var(--accent); }
        .stat .lbl { font-size: 0.7rem; color: var(--dim); margin-top: 4px; }

        /* Кнопки */
        button { background: var(--accent); color: #000; border: none; padding: 14px; border-radius: 12px; font-weight: 800; width: 100%; margin-bottom: 10px; cursor: pointer; font-size: 0.9rem; transition: 0.2s; }
        button:active { transform: scale(0.98); filter: brightness(0.9); }
        button.danger { background: var(--danger); color: #fff; }
        button.secondary { background: #1a2633; color: var(--text); border: 1px solid var(--border); }

        /* Списки и таблицы */
        .list-item { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .list-item .info { display: flex; flex-direction: column; gap: 2px; }
        .list-item .ssid { font-weight: 700; color: var(--text); }
        .list-item .bssid { font-size: 0.7rem; color: var(--dim); font-family: monospace; }
        
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 0.65rem; font-weight: 800; }
        .on { background: rgba(0,230,118,0.1); color: var(--success); border: 1px solid var(--success); }
        .off { background: rgba(255,255,255,0.05); color: var(--dim); border: 1px solid var(--border); }

        pre { background: #000; color: var(--success); padding: 12px; border-radius: 10px; font-size: 0.75rem; font-family: monospace; overflow-x: auto; white-space: pre-wrap; border: 1px solid var(--border); }
        
        /* Скрытие элементов на десктопе (если надо) */
        @media (min-width: 800px) {
            body { max-width: 500px; margin: 0 auto; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">⚡ LICIFER X</div>
    <div class="sys-status">
        Uptime: <span id="uptime">0</span>m<br>
        PSRAM: <span id="psramFree">0</span>MB
    </div>
</header>

<main>
    <!-- DASHBOARD -->
    <div id="dashboard" class="tab active">
        <div class="grid">
            <div class="stat"><div class="val" id="pmkidCount">0</div><div class="lbl">HASHES</div></div>
            <div class="stat"><div class="val" id="netCount">0</div><div class="lbl">NETWORKS</div></div>
        </div>
        
        <div class="card">
            <h2>Active Modules</h2>
            <div style="display:flex; gap:8px; flex-wrap:wrap;">
                <span class="badge off" id="b_deauth">Deauth</span>
                <span class="badge off" id="b_ble">BLE</span>
                <span class="badge off" id="b_autopwn">AI Pwn</span>
                <span class="badge off" id="b_portal">Portal</span>
            </div>
        </div>

        <div class="card">
            <h2>Auto-Pwn AI</h2>
            <button onclick="cmd('start_autopwn')">ENGAGE AUTOPWN</button>
            <button class="danger" onclick="cmd('stop_autopwn')">HALT ENGINE</button>
        </div>
    </div>

    <!-- RADAR -->
    <div id="scanner" class="tab">
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h2 style="margin:0;">Radar</h2>
                <button onclick="cmd('scan')" style="width:auto; padding:8px 15px; margin:0;">Scan</button>
            </div>
            <div id="netList">
                <div style="text-align:center; color:var(--dim); padding:20px;">No networks found yet...</div>
            </div>
        </div>
    </div>

    <!-- ATTACKS -->
    <div id="attacks" class="tab">
        <div class="card">
            <h2>Target</h2>
            <div id="targetDisplay" style="background:var(--bg); padding:15px; border-radius:10px; border:1px solid var(--border); margin-bottom:20px; font-family:monospace; color:var(--accent);">
                SELECT FROM RADAR
            </div>
            <button onclick="runAttack('deauth')">START DEAUTH</button>
            <button onclick="runAttack('sae')">WPA3 SAE FLOOD</button>
            <button class="danger" onclick="stopAll()">STOP ALL ATTACKS</button>
        </div>
    </div>

    <!-- BLE -->
    <div id="ble" class="tab">
        <div class="card">
            <h2>BLE Spammer</h2>
            <select id="bleType" style="width:100%; background:var(--bg); color:white; padding:12px; border-radius:10px; border:1px solid var(--border); margin-bottom:15px;">
                <option value="-1">Mixed (All Types)</option>
                <option value="0">Apple Popups</option>
                <option value="1">Google Fast Pair</option>
                <option value="3">Samsung Buds</option>
            </select>
            <button onclick="cmd('start_ble',{v:parseInt(document.getElementById('bleType').value)})">LAUNCH SPAMMER</button>
            <button class="danger" onclick="cmd('stop_ble')">STOP SPAMMER</button>
        </div>
    </div>

    <!-- SYSTEM -->
    <div id="settings" class="tab">
        <div class="card">
            <h2>Loot & System</h2>
            <button class="secondary" onclick="loadData('/api/pmkid','fsOut')">View Captured Hashes</button>
            <button class="secondary" onclick="loadData('/api/portal','fsOut')">View Portal Logs</button>
            <button class="danger" onclick="if(confirm('Format Storage?')) cmd('format')">Wipe LittleFS</button>
            <pre id="fsOut" style="margin-top:15px;">Console ready...</pre>
        </div>
    </div>
</main>

<nav>
    <a data-tab="dashboard" class="active">
        <svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
        Dash
    </a>
    <a data-tab="scanner">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8z"/><circle cx="12" cy="12" r="3"/></svg>
        Radar
    </a>
    <a data-tab="attacks">
        <svg viewBox="0 0 24 24"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg>
        Attack
    </a>
    <a data-tab="ble">
        <svg viewBox="0 0 24 24"><path d="M17.71 7.71L12 2h-1v7.59L6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 11 14.41V22h1l5.71-5.71-4.3-4.29 4.3-4.29zM13 5.83l1.88 1.88L13 9.59V5.83zm1.88 10.29L13 18.17v-3.76l1.88 1.88z"/></svg>
        BLE
    </a>
    <a data-tab="settings">
        <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
        Sys
    </a>
</nav>

<script>
    let ws;
    let targetBssid = '', targetCh = 1;

    function connect() {
        ws = new WebSocket(`ws://${location.hostname}/ws`);
        ws.onmessage = (e) => {
            const d = JSON.parse(e.data);
            if (d.networks) {
                document.getElementById('netCount').innerText = d.networks.length;
                renderNets(d.networks);
            }
            if (d.deauth !== undefined) updateBadge('b_deauth', d.deauth);
            if (d.ble !== undefined) updateBadge('b_ble', d.ble);
            if (d.autopwn !== undefined) updateBadge('b_autopwn', d.autopwn);
            if (d.portal !== undefined) updateBadge('b_portal', d.portal);
            if (d.pmkid !== undefined) document.getElementById('pmkidCount').innerText = d.pmkid;
        };
        ws.onclose = () => setTimeout(connect, 2000);
    }

    function renderNets(nets) {
        const container = document.getElementById('netList');
        if (nets.length === 0) return;
        container.innerHTML = nets.map(n => `
            <div class="list-item" onclick="pick('${n.bssid}',${n.ch},'${n.ssid}')">
                <div class="info">
                    <div class="ssid">${n.ssid || 'Unknown'}</div>
                    <div class="bssid">${n.bssid} [CH ${n.ch}]</div>
                </div>
                <div style="color:${n.rssi > -70 ? 'var(--success)' : 'var(--danger)'}; font-weight:800; font-size:0.8rem;">
                    ${n.rssi} dBm
                </div>
            </div>
        `).join('');
    }

    function updateBadge(id, s) { document.getElementById(id).className = 'badge ' + (s?'on':'off'); }

    function pick(b, c, s) {
        targetBssid = b; targetCh = c;
        document.getElementById('targetDisplay').innerText = `${s} \n${b} \nChannel: ${c}`;
        document.querySelector('[data-tab="attacks"]').click();
    }

    function runAttack(t) {
        if(!targetBssid) return alert('Select target first');
        cmd(t === 'deauth' ? 'start_deauth' : 'start_sae', {bssid:targetBssid, ch:targetCh});
    }

    function stopAll() { cmd('stop_deauth'); cmd('stop_sae'); cmd('stop_beacon'); }
    function cmd(c, p={}) { ws.send(JSON.stringify({cmd:c, ...p})); }

    function loadData(u, t) {
        fetch(u).then(r => r.text()).then(txt => document.getElementById(t).innerText = txt || 'Log is empty.');
    }

    document.querySelectorAll('nav a').forEach(a => {
        a.onclick = () => {
            document.querySelectorAll('.tab, nav a').forEach(el => el.classList.remove('active'));
            document.getElementById(a.dataset.tab).classList.add('active');
            a.classList.add('active');
        }
    });

    setInterval(() => {
        fetch('/api/sys').then(r => r.json()).then(d => {
            document.getElementById('psramFree').innerText = (d.psram_free / 1024 / 1024).toFixed(1);
            document.getElementById('uptime').innerText = Math.floor(d.uptime / 60000);
        }).catch(()=>{});
    }, 4000);

    connect();
</script>
</body>
</html>
