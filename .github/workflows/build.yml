name: Build ESP32-S3 Firmware

on:
  push:
    paths-ignore:
      - '**.md'
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio esptool

      - name: Build firmware
        run: |
          pio run -e esp32-s3-n16r8

      - name: Build filesystem image (LittleFS)
        run: |
          pio run --target buildfs -e esp32-s3-n16r8

      - name: Merge into single flashable binary
        run: |
          BOOTLOADER=".pio/build/esp32-s3-n16r8/bootloader.bin"
          PARTITIONS=".pio/build/esp32-s3-n16r8/partitions.bin"
          BOOT_APP0="$HOME/.platformio/packages/framework-arduinoespressif32/tools/partitions/boot_app0.bin"
          FIRMWARE=".pio/build/esp32-s3-n16r8/firmware.bin"
          LITTLEFS=".pio/build/esp32-s3-n16r8/littlefs.bin"
          MERGED="licifer_x_n16r8_full.bin"

          # Проверяем наличие всех обязательных файлов
          missing=0
          for file in "$BOOTLOADER" "$PARTITIONS" "$BOOT_APP0" "$FIRMWARE" "$LITTLEFS"; do
            if [ ! -f "$file" ]; then
              echo "Error: $file not found"
              missing=1
            fi
          done
          if [ $missing -eq 1 ]; then
            echo "Aborting merge due to missing files"
            exit 1
          fi

          python -m esptool --chip esp32s3 merge-bin \
            -o "$MERGED" \
            --flash-mode qio \
            --flash-freq 80m \
            --flash-size 16MB \
            0x0 "$BOOTLOADER" \
            0x8000 "$PARTITIONS" \
            0xe000 "$BOOT_APP0" \
            0x10000 "$FIRMWARE" \
            0x510000 "$LITTLEFS"

      - name: Upload merged firmware
        uses: actions/upload-artifact@v4
        with:
          name: licifer_x_n16r8_full
          path: licifer_x_n16r8_full.bin
