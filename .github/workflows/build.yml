name: Build ESP32-S3 Firmware

on:
  push:
    paths-ignore:
      - '**.md'
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio esptool

      - name: Build firmware
        run: pio run -e esp32-s3-n16r8

      - name: Build filesystem image (LittleFS)
        run: pio run --target buildfs -e esp32-s3-n16r8

      - name: Prepare artifacts and flash command
        run: |
          mkdir -p artifacts
          cp .pio/build/esp32-s3-n16r8/bootloader.bin artifacts/
          cp .pio/build/esp32-s3-n16r8/partitions.bin artifacts/
          cp .pio/build/esp32-s3-n16r8/firmware.bin artifacts/
          cp .pio/build/esp32-s3-n16r8/littlefs.bin artifacts/
          cp ~/.platformio/packages/framework-arduinoespressif32/tools/partitions/boot_app0.bin artifacts/

          # Готовая команда для прошивки
          echo 'esptool.py --chip esp32s3 write_flash \
            0x0 bootloader.bin \
            0x8000 partitions.bin \
            0xe000 boot_app0.bin \
            0x10000 firmware.bin \
            0x510000 littlefs.bin' > artifacts/flash_command.sh

          # Суммарный размер (распакованного)
          echo "Total size of components:"
          du -sh artifacts/

      - name: Upload components
        uses: actions/upload-artifact@v4
        with:
          name: firmware_components
          path: artifacts/
