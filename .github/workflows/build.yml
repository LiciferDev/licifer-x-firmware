name: Build ESP32-S3 Firmware

on:
  push:
    paths-ignore:
      - '**.md'
  pull_request:
  workflow_dispatch:  # позволяет запускать вручную

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio esptool

      - name: Build firmware and filesystem
        run: |
          pio run -e esp32-s3-n16r8

      - name: Merge into single flashable binary
        run: |
          # Путь к bootloader.bin, сгенерированному PlatformIO при сборке
          BOOTLOADER_BIN=".pio/build/esp32-s3-n16r8/bootloader.bin"
          # Путь к boot_app0.bin (берется из самого фреймворка)
          BOOT_APP0_BIN="$HOME/.platformio/packages/framework-arduinoespressif32/tools/partitions/boot_app0.bin"
          
          # Проверяем, что bootloader.bin существует
          if [ ! -f "$BOOTLOADER_BIN" ]; then
            echo "Error: $BOOTLOADER_BIN not found!"
            echo "Available files in .pio/build/esp32-s3-n16r8/:"
            ls .pio/build/esp32-s3-n16r8/
            exit 1
          fi

          python -m esptool --chip esp32s3 merge-bin \
            -o licifer_x_n16r8_full.bin \
            --flash-mode qio \
            --flash-freq 80m \
            --flash-size 16MB \
            0x0 "$BOOTLOADER_BIN" \
            0x8000 .pio/build/esp32-s3-n16r8/partitions_custom.bin \
            0xe000 "$BOOT_APP0_BIN" \
            0x10000 .pio/build/esp32-s3-n16r8/firmware.bin \
            0x610000 .pio/build/esp32-s3-n16r8/littlefs.bin

      - name: Upload merged firmware
        uses: actions/upload-artifact@v4
        with:
          name: licifer_x_n16r8_full
          path: licifer_x_n16r8_full.bin
